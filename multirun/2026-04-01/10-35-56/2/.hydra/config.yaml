trainer:
  max_epochs: 20
  val_check_interval: 1.0
  accelerator: auto
  devices:
  - 1
  num_sanity_val_steps: 0
  log_every_n_steps: 32
  strategy: auto
env:
  problem_sig: tsp
  n_particles: 128
  n_dims: 2
  eval_n_starts: 0.1
  do_normalize: false
  training_cfg:
    auto_reset: true
    patience: 10
    reward_mode: greedy
    mode: range
    steps_per_epoch: 64
    batch_size: 4
    k_sparse: 20
    n_cities: 100
  validation_cfg:
    auto_reset: false
    mode: choice
    random_include: false
    random_size: 100
    batch_size: 8
    k_sparse: 20
    n_cities: 100
  test_cfg:
    enable: true
    auto_reset: false
    mode: choice
    random_include: false
    random_size: 1280
    batch_size: 1
    k_sparse: 20
    n_cities: 100
rl_agent:
  name: TSPAgent
  args:
    n_gnn_feats: 2
    emb_dim: 32
    act_fn: silu
    constraint_w_mean:
    - 0.4
    - 0.9
    constraint_c_mean:
    - 1.0
    - 3.0
    constraint_w_std:
    - 0.1
    - 0.2
    constraint_c_std:
    - 0.5
    - 1.0
log:
  save_dir: ./logs
  name: tsp
  version: temp_${hydra:job.num}
rl_train:
  name: MyopicI
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96
    pso_using_random: true
