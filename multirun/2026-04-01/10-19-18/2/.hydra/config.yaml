trainer:
  max_epochs: 20
  val_check_interval: 1.0
  accelerator: auto
  devices:
  - 1
  num_sanity_val_steps: 0
  log_every_n_steps: 32
  strategy: auto
env:
  problem_sig: tsp
  n_particles: 64
  n_dims: 2
  eval_n_starts: 0.1
  do_normalize: false
  training_cfg:
    batch_size: 1
    auto_reset: true
    patience: 10
    reward_mode: delta_pbest_raw
    n_cities: 50
    k_sparse: 10
    mode: range
    steps_per_epoch: 64
  validation_cfg:
    batch_size: 16
    auto_reset: false
    n_cities: 50
    k_sparse: 10
    mode: choice
    random_include: false
    random_size: 100
  test_cfg:
    enable: true
    batch_size: 2
    auto_reset: false
    n_cities: 50
    k_sparse: 10
    mode: choice
    random_include: false
    random_size: 1280
rl_agent:
  name: TSPACAgent
  args:
    n_gnn_feats: 2
    emb_dim: 64
    act_fn: silu
    constraint_w_mean:
    - 0.4
    - 0.9
    constraint_c_mean:
    - 1.0
    - 3.0
    constraint_w_std:
    - 0.1
    - 0.2
    constraint_c_std:
    - 0.5
    - 1.0
log:
  save_dir: ./logs
  name: tsp
  version: temp_${hydra:job.num}
rl_train:
  name: VPG
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96
    use_gae: true
    entropy_coef: 0.01
    vf_coef: 0.5
    gae_lambda: 0.95
    gamma: 0.99
    max_grad_norm: 1.0
    norm_adv: true
    pso_using_random: true
