hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra_plugins.hydra_joblib_launcher.joblib_launcher.JoblibLauncher
    n_jobs: 3
    backend: null
    prefer: processes
    require: null
    verbose: 0
    timeout: null
    pre_dispatch: 2*n_jobs
    batch_size: auto
    temp_folder: null
    max_nbytes: null
    mmap_mode: r
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      problem: tsp
      nc_nk_cases: nc50
      algorithms: vpg,myopic_i
      +pso_update: random_update,raw_update
      env.training_cfg.reward_mode: greedy,delta_pbest,delta_pbest_raw
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra/launcher=joblib
    - hydra.mode=MULTIRUN
    task:
    - +sweeps=hparams
  job:
    name: train
    chdir: null
    override_dirname: +sweeps=hparams
    id: ???
    num: ???
    config_name: main
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /root/longth_projects/deeppso
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/longth_projects/deeppso/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      sweeps: hparams
      algorithms: myopic_i
      nc_nk_cases: nc20
      problem: tsp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: joblib
      hydra/output: default
  verbose: false
trainer:
  max_epochs: 20
  val_check_interval: 1.0
  accelerator: auto
  devices:
  - 1
  num_sanity_val_steps: 0
  log_every_n_steps: 32
  strategy: auto
env:
  problem_sig: tsp
  n_particles: 64
  n_dims: 2
  eval_n_starts: 0.1
  do_normalize: false
  training_cfg:
    batch_size: 16
    auto_reset: true
    patience: 10
    reward_mode: greedy
    n_cities: 20
    k_sparse: 5
    mode: range
    steps_per_epoch: 64
  validation_cfg:
    batch_size: 32
    auto_reset: false
    n_cities: 20
    k_sparse: 5
    mode: choice
    random_include: false
    random_size: 100
  test_cfg:
    enable: true
    batch_size: 32
    auto_reset: false
    n_cities: 20
    k_sparse: 5
    mode: choice
    random_include: false
    random_size: 1280
log:
  save_dir: ./logs
  name: tsp
  version: temp_${hydra:job.num}
rl_agent:
  name: TSPAgent
  args:
    emb_dim: 32
    act_fn: silu
    n_gnn_feats: 2
rl_train:
  name: MyopicI
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96
