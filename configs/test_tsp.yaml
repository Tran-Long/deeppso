# @package _global_

# Hydra output directory configuration
hydra:
  run:
    # Single run: logs/tsp/<version>/
    dir: ${log.save_dir}/${log.name}/${log.version}
  sweep:
    # Multirun: each job gets its own subdirectory named after its overrides
    dir: ${log.save_dir}/${log.name}/multirun
    subdir: ${hydra.job.override_dirname}
  job:
    chdir: false   # Keep cwd at the project root so relative imports & data paths work

# Settings for dataset, aka environment
env:
  # PSO env settings
  problem_sig: "tsp"
  n_particles: 64

  # Problem general specific settings
  n_dims: 2
  eval_n_starts: 0.1
  init_n_heuristic: 0

  training_cfg:
    batch_size: 2
    n_cities: 20
    k_sparse: 5
    mode: "range" # "range" or "choice"
    steps_per_epoch: 3
  
  validation_cfg:
    batch_size: 4
    n_cities: [20, 50]
    k_sparse: 5
    mode: "choice"
    random_include: False
    random_size: 10
    
  test_cfg:
    enable: True
    batch_size: 4
    n_cities: [20, 50]
    k_sparse: 5
    mode: "choice"
    random_include: False
    random_size: 10

rl_agent:
  name: "TSPAgent"
  args:
    emb_dim: 32
    act_fn: "silu"

rl_train:
  name: "PolicyGradientNaive"
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 128

trainer:
  max_epochs: 50
  val_check_interval: 1.0
  accelerator: "auto"
  devices: [2, 3]
  num_sanity_val_steps: 0
  log_every_n_steps: 16

log:
  save_dir: "./logs"
  name: "tsp"
  version: "test"