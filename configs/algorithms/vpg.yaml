# @package _global_
# VPG algorithm configuration
# Intended to be composed with base config via defaults list
# Override: python train.py algorithms=vpg

env:
  training_cfg:
    batch_size: 2

rl_agent:
  name: "TSPACAgent"
  args:
    emb_dim: 64
    act_fn: "silu"
    n_gnn_feats: 2

rl_train:
  name: "VPG"
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96
    use_gae: True
    entropy_coef: 0.01
    vf_coef: 0.5
    gae_lambda: 0.95
    gamma: 0.99
    max_grad_norm: 1.0
    norm_adv: True