# @package _global_
# MyopicI algorithm configuration
# Intended to be composed with base config via defaults list
# Override: python train.py +algorithms=myopic

rl_agent:
  name: "TSPAgent"
  args:
    emb_dim: 32
    act_fn: "silu"
    n_gnn_feats: 2

rl_train:
  name: "MyopicI"
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96