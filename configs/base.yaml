# @package _global_
# Base configuration with environment and trainer settings
# Extend this in other configs and override with algorithm-specific settings

# Hydra output directory configuration
hydra:
  run:
    dir: ${log.save_dir}/${log.name}/${log.version}
  sweep:
    dir: ${log.save_dir}/${log.name}
    subdir: ${log.version}/multirun/${hydra.job.override_dirname}
  job:
    chdir: false   # Keep cwd at the project root so relative imports & data paths work

# Settings for dataset, aka environment
env:
  problem_sig: "tsp"
  n_particles: 64
  n_dims: 2
  eval_n_starts: 0.1
  init_n_heuristic: 0
  do_normalize: False

  training_cfg:
    batch_size: 8
    auto_reset: True
    patience: 10
    reward_mode: "greedy"
    n_cities: 20
    k_sparse: 5
    mode: "range"
    steps_per_epoch: 64
  
  validation_cfg:
    batch_size: 16
    auto_reset: False
    n_cities: 20
    k_sparse: 5
    mode: "choice"
    random_include: False
    random_size: 100
    
  test_cfg:
    enable: True
    batch_size: 16
    auto_reset: False
    n_cities: 20
    k_sparse: 5
    mode: "choice"
    random_include: False
    random_size: 1280

trainer:
  max_epochs: 20
  val_check_interval: 1.0
  accelerator: "auto"
  devices: [0]
  num_sanity_val_steps: 0
  log_every_n_steps: 32
  strategy: auto

log:
  save_dir: "./logs"
  name: "tsp"
  version: "default"
