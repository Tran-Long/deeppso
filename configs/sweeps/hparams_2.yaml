# @package _global_
#
# Modular hyperparameter sweep configuration for TSP training
# 
# Works with any algorithm composed from the algorithms/ directory
#
# Usage:
#   python train.py -m +sweeps=hparams hydra/launcher=joblib
#   python train.py -m +sweeps=hparams +algorithms=ppo hydra/launcher=joblib
#   python train.py -m +sweeps=hparams +algorithms=reinforce hydra/launcher=joblib hydra.launcher.n_jobs=4
#
# Add extra overrides on top of this sweep:
#   python train.py -m +sweeps=hparams trainer.max_epochs=30 hydra/launcher=joblib

# --- Unique log version per sweep job ---
# hydra:job.num is the 0-based index of the job within the sweep
log:
  version: "range_${hydra:job.num}"

# --- Joblib launcher configuration ---
# Using single device per job to avoid DDP subprocess issues
trainer:
  devices: [3]
  strategy: auto

hydra:
  launcher:
    n_jobs: 2

  # --- Sweep grid -------------------------------------------------------
  # Each value is a comma-separated list; BasicSweeper creates the
  # Cartesian product of all lists below
  sweeper:
    params:
      problem: cvrp
      nc_nk_cases: cvrp_nc20_50,cvrp_nc20_100,cvrp_nc20_200
      rl_train.args.pso_iterations_train: 64

