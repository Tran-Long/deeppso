# @package _global_
#
# Hyperparameter sweep configuration for TSP training.
#
# Usage (grid search, runs all combinations concurrently):
#   python train.py -m +sweeps=tsp_hparam hydra/launcher=joblib
#
# Override parallelism on the command line:
#   python train.py -m +sweeps=tsp_hparam hydra/launcher=joblib hydra.launcher.n_jobs=4
#
# Add extra overrides on top of this sweep:
#   python train.py -m +sweeps=tsp_hparam hydra/launcher=joblib trainer.max_epochs=20

# --- Unique log version per sweep job ---
# hydra:job.num is the 0-based index of the job within the sweep.
log:
  version: "reinforce0_${hydra:job.num}"

# Each joblib worker runs as a single process — no DDP child processes.
# DDP spawns sub-processes that re-parse sys.argv and fail on Hydra's
# internal --pipe argument. Using devices=1 avoids the spawn entirely.
trainer:
  devices: [0]
  strategy: auto

# --- Joblib launcher defaults (can still be overridden on the CLI) ---
hydra:
  launcher:
    # -1  → use all available CPUs; set to a positive int to cap concurrency.
    n_jobs: 2

  # --- Sweep grid -------------------------------------------------------
  # Each value is a comma-separated list; BasicSweeper creates the
  # Cartesian product of all lists below.
  sweeper:
    params:
      # Embedding dimension of the agent network
      rl_train.name: REINFORCE
      env.training_cfg.reward_mode: delta_g_raw,stochastic
