# @package _global_
#
# Modular hyperparameter sweep configuration for TSP training
# 
# Works with any algorithm composed from the algorithms/ directory
#
# Usage:
#   python train.py -m +sweeps=tsp_hparam_modular hydra/launcher=joblib
#   python train.py -m +sweeps=tsp_hparam_modular +algorithms=ppo hydra/launcher=joblib
#   python train.py -m +sweeps=tsp_hparam_modular +algorithms=reinforce hydra/launcher=joblib hydra.launcher.n_jobs=4
#
# Add extra overrides on top of this sweep:
#   python train.py -m +sweeps=tsp_hparam_modular trainer.max_epochs=30 hydra/launcher=joblib

# --- Unique log version per sweep job ---
# hydra:job.num is the 0-based index of the job within the sweep
log:
  version: "myopicS_base_${hydra:job.num}"

# --- Joblib launcher configuration ---
# Using single device per job to avoid DDP subprocess issues
trainer:
  devices: [2]
  strategy: auto

hydra:
  launcher:
    n_jobs: 1              # Set -1 for all CPUs, adjust as needed

  # --- Sweep grid -------------------------------------------------------
  # Each value is a comma-separated list; BasicSweeper creates the
  # Cartesian product of all lists below
  sweeper:
    params:
      algorithms: myopic
      +nc_nk_cases: nc20,nc50,nc100,nc200,nc500

