env:
  # PSO env settings
  problem_sig: "tsp"
  n_particles: 64

  # Problem general specific settings
  n_dims: 2
  eval_n_starts: 0.1
  init_n_heuristic: 0

  training_cfg:
    batch_size: 1
    k_sparse: [5, 10, 20, 20]
    mode: "range"
    n_cities: [20, 50, 100, 200]
    steps_per_epoch: 256
  
  validation_cfg:
    batch_size: 1
    k_sparse: [5, 10, 20, 20, 50]
    mode: "choice"
    n_cities: [20, 50, 100, 200, 500]
    random_include: False
    random_size: 100
    
  test_cfg:
    enable: True
    batch_size: 1
    k_sparse: [5, 10, 20, 20, 50, 100]
    mode: "choice"
    n_cities: [20, 50, 100, 200, 500, 1000]
    random_include: False
    random_size: 1280

aco_agent:
  n_cities: [20, 50, 100, 200, 500, 1000]
  n_ants: [5, 10, 20, 20, 50, 100]
  mode: "range" # "range" or "choice"
  aco_iterations_infer: 10


trainer:
  max_epochs: 10
  val_check_interval: 1.0
  accelerator: "cuda"
  devices: [3]
  num_sanity_val_steps: 0
  log_every_n_steps: 16
  strategy: auto


log:
  save_dir: "./logs"
  name: "aco_tsp"
  version: "range_2"