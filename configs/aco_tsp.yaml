env:
  # PSO env settings
  problem_sig: "tsp"
  n_particles: 64

  # Problem general specific settings
  n_dims: 2
  eval_n_starts: 0.1
  init_n_heuristic: 0

  training_cfg:
    batch_size: 1
    n_cities: 20
    k_sparse: 5
    mode: "range" # "range" or "choice"
    steps_per_epoch: 128
  
  validation_cfg:
    batch_size: 4
    n_cities: 20
    k_sparse: 5
    mode: "choice"
    random_include: False
    random_size: 100
    
  test_cfg:
    enable: True
    batch_size: 4
    n_cities: [20, 50]
    k_sparse: [5, 10]
    mode: "choice"
    random_include: False
    random_size: 1280

aco_agent:
  n_cities: [20, 50]
  n_ants: 20
  mode: "choice" # "range" or "choice"
  aco_iterations_infer: 20


trainer:
  max_epochs: 10
  accelerator: "cuda"
  devices: [2]
  num_sanity_val_steps: 0
  log_every_n_steps: 16
  default_root_dir: "logs/aco_tsp"