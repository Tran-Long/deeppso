# @package _global_

# Hydra output directory configuration
hydra:
  run:
    # Single run: logs/tsp/<version>/
    dir: ${log.save_dir}/${log.name}/${log.version}
  sweep:
    # Multirun: each job gets its own subdirectory named after its overrides
    # Use log.save_dir/log.name as base (same as TensorBoard), then each job's overrides
    dir: ${log.save_dir}/${log.name}
    subdir: ${log.version}/multirun/${hydra.job.override_dirname}
  job:
    chdir: false   # Keep cwd at the project root so relative imports & data paths work

# Settings for dataset, aka environment
env:
  # PSO env settings
  problem_sig: "tsp"
  n_particles: 64

  # Problem general specific settings
  n_dims: 2
  eval_n_starts: 0.1
  init_n_heuristic: 0

  training_cfg:
    batch_size: 8
    auto_reset: True
    patience: 5
    reward_mode: "stochastic" # "stochastic" / "greedy" / "pbest" / "delta_pg" / "delta_g" / "delta_g_raw"
    n_cities: [20, 50]
    k_sparse: [5, 10]
    mode: "range" # "range" or "choice"
    steps_per_epoch: 128
  
  validation_cfg:
    batch_size: 16
    auto_reset: False
    n_cities: [20, 50]
    k_sparse: [5, 10]
    mode: "choice"
    random_include: False
    random_size: 100
    
  test_cfg:
    enable: True
    batch_size: 16
    auto_reset: False
    n_cities: [20, 50, 100]
    k_sparse: [5, 10, 20]
    mode: "choice"
    random_include: False
    random_size: 640

rl_agent:
  name: "TSPACAgent"
  args:
    emb_dim: 32
    act_fn: "silu"

rl_train:
  name: "PPO"
  args:
    pso_iterations_train: 64
    pso_iterations_infer: 96
    use_gae: True
    clip_coef: 0.2
    clip_vloss: False
    entropy_coef: 0.01
    vf_coef: 0.5
    gae_lambda: 0.95
    gamma: 0.99
    num_updates: 4
    mini_batch_size: 64
    max_grad_norm: 0.5
    norm_adv: True

trainer:
  max_epochs: 25
  val_check_interval: 1.0
  accelerator: "auto"
  devices: [3]
  num_sanity_val_steps: 0
  log_every_n_steps: 16
  strategy: auto
  # strategy: ddp_find_unused_parameters_true

log:
  save_dir: "./logs"
  name: "tsp"
  version: "ppo-test"